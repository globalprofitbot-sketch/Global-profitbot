<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Profit Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: linear-gradient(135deg, #2c3e50, #000000); padding: 20px; border-radius: 15px; border: 1px solid #f1c40f; margin-bottom: 20px; }
        .balance { font-size: 32px; font-weight: bold; color: #f1c40f; }
        .btn { background: #f1c40f; color: black; padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: bold; display: block; margin: 10px 0; }
        .vip-badge { background: gold; color: black; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <p>Welcome, <span id="username">Partner</span>!</p>
        <div id="status-area"></div>
        <p>Current Balance</p>
        <div class="balance">$<span id="balance">0.00</span> USDT</div>
    </div>

    <a href="#" class="btn" onclick="tg.close()">🔥 Start Earning</a>
    <a href="https://pay.squadco.com/AHV1S3" class="btn">💎 Upgrade to VIP</a>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Makes the app full screen

        // Set user info from Telegram
        document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        
        // This is where you would normally fetch data from your Bot.Business API
        // For now, it's a beautiful placeholder
    </script>
</body>
</html>
